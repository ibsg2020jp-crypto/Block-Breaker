<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="スマホとPCで遊べるシンプルなブロック崩しゲーム" />
    <title>ブロック崩し</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-header__brand">Block Breaker</div>
        <div class="app-header__note">スマホ対応 / ログイン不要</div>
      </header>

      <main>
        <section id="titleScreen" class="screen">
          <div class="panel hero">
            <h1>ブロック崩し</h1>
            <p>
              ボールを反射させてブロックを壊そう。スイッチ、ワープ、タイムアタック、実績つきの軽量ブラウザゲームです。
            </p>
            <div class="menu-grid">
              <button id="startButton" class="primary-button">はじめる</button>
              <button id="stageButton">ステージ選択</button>
              <button id="achievementButton">実績</button>
              <button id="settingsButton">設定</button>
            </div>
          </div>
        </section>

        <section id="stageScreen" class="screen">
          <div class="panel">
            <h2>ステージ選択</h2>
            <p>クリアすると次のステージが開放されます。記録は現在の難易度・速度設定ごとに保存され、総合最高スコアも残ります。</p>
            <div id="stageList" class="stage-list"></div>
            <div class="panel-actions">
              <button data-screen="titleScreen" class="secondary-button">タイトルへ戻る</button>
            </div>
          </div>
        </section>

        <section id="dialogueScreen" class="screen">
          <div class="panel">
            <h2 id="dialogueTitle">ステージ</h2>
            <div class="dialogue-box">
              <p id="dialogueText"></p>
            </div>
            <div class="panel-actions">
              <button id="dialogueNextButton" class="primary-button">次へ</button>
            </div>
          </div>
        </section>

        <section id="gameScreen" class="screen game-screen">
          <div class="hud" aria-label="ゲーム情報">
            <div class="hud__item"><span>Stage</span><strong id="hudStage">-</strong></div>
            <div class="hud__item"><span>Score</span><strong id="hudScore">0</strong></div>
            <div class="hud__item"><span>Life</span><strong id="hudLives">3</strong></div>
            <div class="hud__item"><span>Time</span><strong id="hudTime">0:00</strong></div>
          </div>
          <div class="canvas-wrap">
            <canvas id="gameCanvas" width="360" height="640" aria-label="ブロック崩しゲーム画面"></canvas>
          </div>
          <p class="touch-hint">ドラッグでパドル移動。タップ / クリック / Space でボール発射。</p>
          <div class="game-actions">
            <button id="pauseButton">一時停止</button>
            <button data-screen="stageScreen" class="secondary-button">ステージ選択へ</button>
          </div>
        </section>

        <section id="resultScreen" class="screen">
          <div class="panel">
            <h2 id="resultTitle">結果</h2>
            <p id="resultSubtitle"></p>
            <div id="resultStats" class="result-stats"></div>
            <p id="resultAchievements"></p>
            <div class="panel-actions">
              <button id="nextStageButton" class="primary-button">次のステージへ</button>
              <button id="retryButton">もう一度遊ぶ</button>
              <button id="resultStageButton" class="secondary-button">ステージ選択へ</button>
            </div>
          </div>
        </section>

        <section id="achievementScreen" class="screen">
          <div class="panel">
            <h2>実績</h2>
            <ul id="achievementList" class="achievement-list"></ul>
            <div class="panel-actions">
              <button data-screen="titleScreen" class="secondary-button">タイトルへ戻る</button>
            </div>
          </div>
        </section>

        <section id="settingsScreen" class="screen">
          <div class="panel">
            <h2>設定</h2>

            <div class="setting-row">
              <div>
                <strong>サウンド</strong>
                <p>ブラウザ標準の簡易音を鳴らします。</p>
              </div>
              <label class="switch" aria-label="サウンド切り替え">
                <input id="soundToggle" type="checkbox" />
                <span></span>
              </label>
            </div>

            <label class="setting-block" for="difficultySelect">
              <span class="setting-block__title">難易度</span>
              <select id="difficultySelect">
                <option value="easy">イージー</option>
                <option value="normal">ノーマル</option>
                <option value="hard">ハード</option>
                <option value="nightmare">ナイトメア</option>
              </select>
              <small id="difficultyDescription">制限時間 1x / パドル 1x / スコア 1x</small>
            </label>

            <label class="setting-block" for="ballSpeedRange">
              <span class="setting-block__title">ボールの速さ <strong id="ballSpeedValue">1.0x</strong></span>
              <input id="ballSpeedRange" type="range" min="0.5" max="3" step="0.1" value="1" />
              <small>0.5x〜3.0xまで調整できます。プレイ開始時に反映されます。</small>
            </label>

            <div class="panel-actions">
              <button id="resetSaveButton" class="secondary-button">セーブデータをリセット</button>
              <button data-screen="titleScreen">タイトルへ戻る</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
